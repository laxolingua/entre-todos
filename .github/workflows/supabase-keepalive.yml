name: Keep Supabase Alive

on:
schedule:
- cron: "0 8 * * 1,3,5"
workflow_dispatch:

jobs:
ping:
runs-on: ubuntu-latest
steps:
- name: Ping active Supabase project
run: |
curl -sS "https://pfjcumyygdwslwtrlebr.supabase.co/rest/v1/citizen_proposals?select=id&limit=1" \
-H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
-H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
-H "Accept: application/json"
